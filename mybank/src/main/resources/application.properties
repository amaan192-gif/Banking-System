spring.application.name=demo

# Database Connection (Fetched from .env or Render Environment)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Properties
# Use "update" for development, but "validate" for production later
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Server Port - Uses PORT from environment (Render) or SERVER_PORT from .env
server.port=${PORT:${SERVER_PORT:8080}}

# Health & Management
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always